<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="description" content="منصة أثير العيد - الواجهة الأفخم لتصميم بطاقات المعايدة، برؤية المطور عبد الله عمران.">
<meta name="keywords" content="عبد الله عمران, أثير العيد, تهنئة العيد, تصميم بطاقات, Abdullah Omran, تطوير مواقع">
<meta name="author" content="عبد الله عمران">

<meta property="og:title" content="أثير العيد | بواسطة عبد الله عمران">
<meta property="og:description" content="صمم بطاقتك الآن بلمسة إبداعية من تطوير عبد الله عمران.">
<meta property="og:image" content="رابط_صورة_لو_عندك"> 

<title>عيد مبارك – أثير العيد</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--g:#D4AF37;--gd:#8C6B1F;--gl:#FFF3B0;--bk:#080808;--bl:#071528;--wh:#F5EDD8;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bk);}
body{font-family:"Amiri",serif;color:var(--wh);touch-action:none;}
button{cursor:pointer;font-family:"Amiri",serif;border:none;outline:none;}
input,select{font-family:"Amiri",serif;outline:none;}

/* PARTICLES */
#pc{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* SCENES */
.sc{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .7s ease;}
.sc.on{opacity:1;pointer-events:all;}

/* ══ S1 INTRO ══ */
#s1{background:var(--bk);gap:clamp(20px,4vh,40px);padding:20px;}
.intro-title{
  font-family:"Scheherazade New",serif;
  font-size:clamp(52px,14vw,160px);
  line-height:1;
  background:linear-gradient(120deg,var(--gd) 0%,var(--g) 35%,var(--gl) 50%,var(--g) 65%,var(--gd) 100%);
  background-size:300%;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
  filter:drop-shadow(0 0 30px rgba(212,175,55,.45));
  opacity:0;
  animation:introIn 1s cubic-bezier(.2,1,.3,1) .3s forwards, shine 4s linear 1.3s infinite;
}
@keyframes introIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes shine{0%{background-position:0%}100%{background-position:300%}}

.intro-divider{
  width:clamp(160px,40vw,380px);height:1px;
  background:linear-gradient(90deg,transparent,var(--g),transparent);
  opacity:0;animation:fadeIn .8s ease 1s forwards;
}
.intro-sub{
  font-size:clamp(12px,2.5vw,18px);
  color:rgba(212,175,55,.55);letter-spacing:6px;text-align:center;
  opacity:0;animation:fadeIn .8s ease 1.3s forwards;
}
@keyframes fadeIn{to{opacity:1;}}
.intro-cta{
  opacity:0;animation:fadeIn .8s ease 1.8s forwards;
  margin-top:clamp(8px,2vh,20px);
  padding:clamp(11px,2vh,15px) clamp(30px,6vw,56px);
  background:transparent;
  border:1.5px solid rgba(212,175,55,.5);border-radius:3px;
  color:var(--g);font-family:"Scheherazade New",serif;
  font-size:clamp(14px,3vw,18px);letter-spacing:3px;
  transition:all .3s;
  animation:fadeIn .8s ease 1.8s forwards, pulseGold 2.5s ease 2.6s infinite;
}
.intro-cta:hover,.intro-cta:active{background:rgba(212,175,55,.1);border-color:var(--g);box-shadow:0 0 20px rgba(212,175,55,.2);}

/* ══ S2 INPUT ══ */
#s2{background:radial-gradient(ellipse at center,#0a1c30 0%,var(--bk) 70%);padding:16px;}
.box{
  position:relative;width:min(430px,90vw);
  padding:clamp(24px,5vw,50px) clamp(22px,6vw,60px);
  background:rgba(212,175,55,.025);
  border:1px solid rgba(212,175,55,.32);border-radius:4px;
}
.bk-corner{position:absolute;width:22px;height:22px;}
.bk-corner svg{width:100%;height:100%;}
.bka{top:-1px;right:-1px;}.bkb{top:-1px;left:-1px;transform:scaleX(-1);}
.bkc{bottom:-1px;right:-1px;transform:scaleY(-1);}.bkd{bottom:-1px;left:-1px;transform:scale(-1);}
.bh{text-align:center;margin-bottom:clamp(18px,4vw,30px);}
.bh h2{font-family:"Scheherazade New",serif;font-size:clamp(22px,5vw,36px);background:linear-gradient(120deg,var(--gd),var(--g),var(--gl),var(--g));background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite;}
.bh p{margin-top:5px;font-size:clamp(10px,2vw,12px);color:rgba(212,175,55,.38);letter-spacing:2px;}
.fg{margin-bottom:clamp(12px,3vw,18px);}
.fg label{display:block;font-size:11px;color:rgba(212,175,55,.58);letter-spacing:3px;margin-bottom:6px;}
.fg input,.fg select{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(212,175,55,.22);border-radius:3px;padding:clamp(9px,2vw,12px) 12px;color:var(--wh);font-size:clamp(14px,2.5vw,16px);text-align:right;transition:border-color .3s,box-shadow .3s;-webkit-appearance:none;}
.fg input:focus,.fg select:focus{border-color:var(--g);box-shadow:0 0 10px rgba(212,175,55,.28);}
.fg select option{background:#111;}
.go{width:100%;padding:clamp(10px,2.5vw,13px);background:linear-gradient(135deg,var(--gd),var(--g));border-radius:3px;color:#000;font-family:"Scheherazade New",serif;font-size:clamp(15px,3vw,18px);font-weight:700;letter-spacing:2px;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
.go:active{transform:scale(.98);}
.go::after{content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transition:left .45s;}
.go:hover::after{left:160%;}

/* ══ S3 ENVELOPE ══ */
#s3{background:radial-gradient(ellipse at center,#0a1c30 0%,var(--bk) 70%);gap:clamp(24px,4vh,44px);padding:20px;}
.ev-shell{position:relative;width:min(280px,68vw);aspect-ratio:1.62;cursor:pointer;}
.ev-body{position:absolute;inset:0;border-radius:3px;background:linear-gradient(175deg,#1c1c1c,#111);box-shadow:0 0 0 1.5px var(--g),0 20px 50px rgba(0,0,0,.8),0 0 25px rgba(212,175,55,.1);overflow:hidden;}
.ev-flap{position:absolute;top:0;left:0;right:0;clip-path:polygon(0 0,100% 0,50% 62%);background:linear-gradient(170deg,#222,#151515);height:55%;transform-origin:top center;transition:transform .85s cubic-bezier(.4,0,.2,1);z-index:3;box-shadow:0 4px 10px rgba(0,0,0,.4);}
.ev-flap.open{transform:rotateX(-150deg);}
.ev-et{position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--gd),var(--g),var(--gd));}
.ev-eb{position:absolute;bottom:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--gd),var(--g),var(--gd));}
.ev-el{position:absolute;top:0;bottom:0;left:0;width:1.5px;background:linear-gradient(180deg,var(--gd),var(--g),var(--gd));}
.ev-er{position:absolute;top:0;bottom:0;right:0;width:1.5px;background:linear-gradient(180deg,var(--gd),var(--g),var(--gd));}
.ev-lines{position:absolute;bottom:22%;left:20%;right:20%;display:flex;flex-direction:column;gap:6px;}
.ev-line{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.2),transparent);}
#openbtn{display:flex;align-items:center;gap:10px;padding:clamp(11px,2.5vh,15px) clamp(24px,5vw,44px);background:transparent;border:1.5px solid rgba(212,175,55,.5);border-radius:3px;color:var(--g);font-family:"Scheherazade New",serif;font-size:clamp(15px,3vw,19px);letter-spacing:2px;animation:pulseGold 2s ease-in-out infinite;transition:all .3s;}
#openbtn:hover,#openbtn:active{background:rgba(212,175,55,.1);border-color:var(--g);box-shadow:0 0 20px rgba(212,175,55,.2);animation:none;}
#openbtn:disabled{opacity:.35;cursor:default;animation:none;}
@keyframes pulseGold{0%,100%{border-color:rgba(212,175,55,.42);box-shadow:none;}50%{border-color:rgba(212,175,55,.9);box-shadow:0 0 16px rgba(212,175,55,.28);}}

/* ══ S4 CARD ══ */
#s4{background:var(--bk);padding:clamp(52px,9vh,80px) 8px clamp(60px,11vh,88px);}
.cv{width:100%;height:100%;display:flex;align-items:center;justify-content:center;perspective:1100px;}
.card{position:relative;width:min(820px,96vw);aspect-ratio:7/4;min-height:min(300px,54vw);background:linear-gradient(135deg,#080808 0%,#071528 55%,#080808 100%);border:1.5px solid var(--g);border-radius:4px;overflow:hidden;box-shadow:0 0 30px rgba(212,175,55,.18),0 0 70px rgba(7,21,40,.6),0 30px 70px rgba(0,0,0,.8);transform-style:preserve-3d;opacity:0;transform:scale(.88) translateY(30px);will-change:transform;}
.card::before{content:"";position:absolute;inset:clamp(6px,1.2vw,10px);border:1px solid rgba(212,175,55,.17);border-radius:2px;pointer-events:none;z-index:2;}
.card.show{animation:cr 1s cubic-bezier(.2,1,.3,1) forwards;}
@keyframes cr{to{opacity:1;transform:scale(1) translateY(0);}}
#sc2{position:absolute;inset:0;pointer-events:none;}
.cgeo{position:absolute;inset:0;opacity:.045;pointer-events:none;}
.cc{position:absolute;pointer-events:none;width:clamp(32px,6vw,55px);height:clamp(32px,6vw,55px);}
.cc.tl{top:5px;right:5px;}.cc.tr{top:5px;left:5px;transform:scaleX(-1);}
.cc.bl{bottom:5px;right:5px;transform:scaleY(-1);}.cc.br{bottom:5px;left:5px;transform:scale(-1);}
.cshine{position:absolute;inset:0;pointer-events:none;z-index:3;background:linear-gradient(40deg,transparent 30%,rgba(255,255,255,.022) 50%,transparent 70%);background-size:200% 200%;animation:sw 2.8s ease-in-out infinite;}
@keyframes sw{0%{background-position:200% 200%;opacity:.2;}50%{opacity:.85;}100%{background-position:-200% -200%;opacity:.2;}}
.cmoon{position:absolute;top:clamp(4px,1.2vw,12px);left:50%;transform:translateX(-50%);font-size:clamp(14px,3vw,38px);opacity:.12;pointer-events:none;z-index:1;}
.ccont{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(3px,1vw,11px);padding:clamp(8px,3vw,30px);text-align:center;}
.cbism{font-family:"Scheherazade New",serif;font-size:clamp(8px,1.6vw,14px);color:rgba(212,175,55,.5);letter-spacing:3px;}
.cdiv{width:55%;height:1px;flex-shrink:0;background:linear-gradient(90deg,transparent,var(--g),transparent);opacity:.4;}
.ceid{font-family:"Scheherazade New",serif;font-size:clamp(24px,7vw,80px);line-height:1.05;background:linear-gradient(120deg,var(--gd) 0%,var(--g) 35%,var(--gl) 50%,var(--g) 65%,var(--gd) 100%);background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite;filter:drop-shadow(0 0 15px rgba(212,175,55,.35));}
.cto{font-size:clamp(8px,1.1vw,12px);color:rgba(212,175,55,.4);letter-spacing:4px;}
.cname{font-family:"Scheherazade New",serif;font-size:clamp(14px,3.8vw,42px);line-height:1.2;background:linear-gradient(120deg,var(--gd),var(--g),var(--gl),var(--g),var(--gd));background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 4s linear infinite;max-width:86%;word-break:break-word;}
.cdua{font-family:"Amiri",serif;font-style:italic;font-size:clamp(8px,1.4vw,13px);color:rgba(245,237,216,.6);line-height:2;max-width:78%;}
.csig{position:absolute;bottom:clamp(3px,.8vw,9px);left:50%;transform:translateX(-50%);font-size:clamp(6px,.75vw,9px);color:rgba(212,175,55,.2);letter-spacing:3px;white-space:nowrap;z-index:6;}

/* ══ ACTIONS BAR – beautiful visible pill buttons ══ */
#acts{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:50;
  opacity:0;
  transition:opacity .6s ease 1s;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:0 10px clamp(8px,2vh,16px);
  background:linear-gradient(to top, rgba(8,8,8,.95) 60%, transparent);
  pointer-events:none;
}
#acts.on{opacity:1;pointer-events:all;}

.acts-inner{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:clamp(6px,1.5vw,10px);
  max-width:700px;
  padding:clamp(10px,2vh,16px) 0 0;
}

.ab{
  display:flex;align-items:center;gap:6px;
  padding:clamp(9px,1.5vh,12px) clamp(14px,2.5vw,22px);
  border-radius:50px;
  font-family:"Amiri",serif;
  font-size:clamp(12px,1.8vw,15px);
  letter-spacing:.5px;
  white-space:nowrap;
  transition:all .25s;
  border:none;
}

/* each button has its own personality */
.ab-audio{background:linear-gradient(135deg,#1a3a1a,#0d2a0d);color:#5de85d;border:1px solid rgba(93,232,93,.35);box-shadow:0 0 12px rgba(93,232,93,.12);}
.ab-audio:hover,.ab-audio:active{background:linear-gradient(135deg,#1e451e,#112e11);box-shadow:0 0 20px rgba(93,232,93,.3);transform:translateY(-2px);}
.ab-audio.pl{background:linear-gradient(135deg,#0d2a0d,#061606);box-shadow:0 0 16px rgba(93,232,93,.4);}

.ab-dl{background:linear-gradient(135deg,var(--gd),var(--g));color:#000;box-shadow:0 4px 15px rgba(212,175,55,.3);}
.ab-dl:hover,.ab-dl:active{background:linear-gradient(135deg,var(--g),var(--gl));box-shadow:0 6px 22px rgba(212,175,55,.5);transform:translateY(-2px);}

.ab-wa{background:linear-gradient(135deg,#075e54,#128c7e);color:#fff;box-shadow:0 4px 15px rgba(7,94,84,.4);}
.ab-wa:hover,.ab-wa:active{background:linear-gradient(135deg,#128c7e,#25d366);box-shadow:0 6px 22px rgba(37,211,102,.4);transform:translateY(-2px);}

.ab-dec{background:linear-gradient(135deg,#1a1040,#2d1b6e);color:#c8a8ff;border:1px solid rgba(200,168,255,.3);box-shadow:0 4px 15px rgba(100,50,200,.25);}
.ab-dec:hover,.ab-dec:active{background:linear-gradient(135deg,#2d1b6e,#4a2d99);box-shadow:0 6px 22px rgba(100,50,200,.45);transform:translateY(-2px);}

.ab-back{background:rgba(255,255,255,.06);color:rgba(212,175,55,.7);border:1px solid rgba(212,175,55,.2);}
.ab-back:hover,.ab-back:active{background:rgba(212,175,55,.1);color:var(--g);border-color:rgba(212,175,55,.5);transform:translateY(-2px);}

.ab-icon{font-size:clamp(13px,2vw,16px);line-height:1;}

/* ══ DECOR ══ */
#dec{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.82);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .5s;}
#dec.on{opacity:1;pointer-events:all;}
.dm{position:absolute;top:6%;right:6%;font-size:clamp(44px,9vw,100px);opacity:.75;animation:fl 7s ease-in-out infinite;}
.dl{position:absolute;font-size:clamp(30px,6vw,68px);opacity:.6;}
.dl:nth-child(2){top:9%;left:5%;animation:fl 5s ease-in-out infinite;}
.dl:nth-child(3){top:14%;left:22%;animation:fl 6.5s ease-in-out infinite 1s;}
.dl:nth-child(4){top:3%;right:22%;animation:fl 8s ease-in-out infinite .5s;}
.dl:nth-child(5){bottom:20%;left:8%;animation:fl 7s ease-in-out infinite 2s;}
.dl:nth-child(6){bottom:15%;right:6%;animation:fl 5.5s ease-in-out infinite 1.5s;}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-16px) rotate(4deg);}}

/* FOOTER */
#fsig{position:fixed;bottom:clamp(72px,10vh,90px);left:50%;transform:translateX(-50%);font-size:clamp(8px,1.3vw,10px);color:rgba(212,175,55,.18);letter-spacing:4px;white-space:nowrap;z-index:48;opacity:0;transition:opacity 1s ease 2s;}
#fsig.on{opacity:.5;}
#fl{position:fixed;inset:0;z-index:200;background:rgba(212,175,55,.1);opacity:0;pointer-events:none;transition:opacity .25s;}

@media(max-width:400px){.ab{padding:8px 11px;font-size:11px;}.acts-inner{gap:5px;}}
@media(max-height:520px){.ccont{gap:2px;}#s4{padding:44px 6px 58px;}}
/* تنسيق توقيع المطور الفخم في أسفل الشاشة */
.abdullah-signature {
    position: fixed;
    bottom: 15px;
    left: 15px;
    z-index: 1000;
    font-family: 'Scheherazade New', serif;
    background: rgba(8, 8, 8, 0.7);
    padding: 8px 18px;
    border-radius: 50px;
    border: 1px solid var(--gd);
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.4s ease;
}

.abdullah-signature:hover {
    transform: translateY(-5px);
    box-shadow: 0 5px 20px rgba(212, 175, 55, 0.6);
    border-color: var(--gl);
}

.abdullah-signature span {
    color: var(--wh);
    font-size: 12px;
    opacity: 0.8;
}

.abdullah-signature strong {
    color: var(--g);
    font-size: 16px;
    text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
}

</style>
</head>
<body>
<canvas id="pc"></canvas>
<div class="abdullah-signature">
    <span>Developed with Style by</span>
    <strong>عبد الله عمران</strong>
</div>

<div id="fl"></div>

<!-- AUDIO ELEMENT with real mp3 -->


<!-- ══ SCENE 1: INTRO ══ -->
<div class="sc on" id="s1">
  <h1 class="intro-title">عيد مبارك</h1>
  <div class="intro-divider"></div>
  <p class="intro-sub">✦ &nbsp; أثير العيد &nbsp; ✦</p>
  <button class="intro-cta" onclick="go('s2')">✦ &nbsp; ابدأ التجربة &nbsp; ✦</button>
</div>

<!-- ══ SCENE 2: INPUT ══ -->
<div class="sc" id="s2">
  <div class="box">
    <div class="bk-corner bka"><svg viewBox="0 0 22 22" fill="none"><path d="M0,0 L22,0 L22,3.5 L3.5,3.5 L3.5,22 L0,22Z" stroke="#D4AF37" stroke-width=".9"/><circle cx="3.5" cy="3.5" r="2" fill="#D4AF37" opacity=".45"/></svg></div>
    <div class="bk-corner bkb"><svg viewBox="0 0 22 22" fill="none"><path d="M0,0 L22,0 L22,3.5 L3.5,3.5 L3.5,22 L0,22Z" stroke="#D4AF37" stroke-width=".9"/><circle cx="3.5" cy="3.5" r="2" fill="#D4AF37" opacity=".45"/></svg></div>
    <div class="bk-corner bkc"><svg viewBox="0 0 22 22" fill="none"><path d="M0,0 L22,0 L22,3.5 L3.5,3.5 L3.5,22 L0,22Z" stroke="#D4AF37" stroke-width=".9"/><circle cx="3.5" cy="3.5" r="2" fill="#D4AF37" opacity=".45"/></svg></div>
    <div class="bk-corner bkd"><svg viewBox="0 0 22 22" fill="none"><path d="M0,0 L22,0 L22,3.5 L3.5,3.5 L3.5,22 L0,22Z" stroke="#D4AF37" stroke-width=".9"/><circle cx="3.5" cy="3.5" r="2" fill="#D4AF37" opacity=".45"/></svg></div>
    <div class="bh">
      <h2>أنشئ تهنئتك</h2>
      <p>✦ خصّص بطاقتك الاحتفالية ✦</p>
    </div>
    <div class="fg">
      <label>الاسم</label>
      <input type="text" id="iname" placeholder="أدخل الاسم..." maxlength="38" autocomplete="off"/>
    </div>
    <div class="fg">
      <label>اللقب</label>
      <select id="ititle">
        <option value="">— بدون لقب —</option>
        <option value="الدكتور">الدكتور</option>
        <option value="الدكتورة">الدكتورة</option>
        <option value="الأستاذ">الأستاذ</option>
        <option value="الأستاذة">الأستاذة</option>
        <option value="المهندس">المهندس</option>
        <option value="المهندسة">المهندسة</option>
        <option value="الشيخ">الشيخ</option>
        <option value="الحاج">الحاج</option>
        <option value="الحاجة">الحاجة</option>
      </select>
    </div>
    <button class="go" onclick="step2()">✦ &nbsp; أنشئ البطاقة &nbsp; ✦</button>
  </div>
</div>

<!-- ══ SCENE 3: ENVELOPE ══ -->
<div class="sc" id="s3">
  <div class="ev-shell" onclick="step3()">
    <div class="ev-body">
      <div class="ev-flap" id="evf"></div>
      <div class="ev-et"></div><div class="ev-eb"></div>
      <div class="ev-el"></div><div class="ev-er"></div>
      <div class="ev-lines">
        <div class="ev-line"></div><div class="ev-line"></div><div class="ev-line"></div>
      </div>
    </div>
  </div>
  <button id="openbtn" onclick="step3()">

<script>
/* ── STATE ── */
let W=innerWidth,H=innerHeight,parallaxOn=false,decOn=false,uName='';
addEventListener("resize",()=>{W=innerWidth;H=innerHeight;rsPC();});

/* ── PARTICLES ── */
const PC=document.getElementById("pc"),PCx=PC.getContext("2d");
let pts=[];
function rsPC(){PC.width=W;PC.height=H;}
rsPC();
class P{
  constructor(x,y,g){
    this.x=x??Math.random()*W;this.y=y??Math.random()*H;
    this.s=g?Math.random()*1.8+.4:Math.random()*1.1+.25;
    this.vx=(Math.random()-.5)*(g?1.3:.2);
    this.vy=(Math.random()-.5)*(g?1:.15)-(g?.3:.06);
    this.life=1;this.dc=g?Math.random()*.022+.013:.0013;
    this.gold=g||Math.random()>.6;this.g=g;this.tw=Math.random()*Math.PI*2;
  }
  tick(){this.x+=this.vx;this.y+=this.vy;this.life-=this.dc;if(this.g)this.s*=.982;}
  draw(){
    const tw=.5+.5*Math.sin(Date.now()*.003+this.tw);
    const a=this.life*(this.g?tw:.2+.8*tw);
    PCx.beginPath();PCx.arc(this.x,this.y,Math.max(.1,this.s),0,Math.PI*2);
    PCx.fillStyle=this.gold?`rgba(212,175,55,${a})`:`rgba(255,243,176,${a*.4})`;PCx.fill();
  }
}
function initStars(){for(let i=0;i<95;i++){const p=new P();p.dc=0;p.life=Math.random();pts.push(p);}}
function animPts(){
  PCx.clearRect(0,0,W,H);pts=pts.filter(p=>p.life>0);
  const bg=pts.filter(p=>p.dc===0).length;
  if(bg<65){const p=new P();p.dc=0;p.life=.03;pts.push(p);}
  pts.forEach(p=>{p.tick();if(!p.dc)p.life=Math.max(.03,Math.min(1,p.life));p.draw();});
  requestAnimationFrame(animPts);
}
initStars();animPts();

/* ── SCENE ── */
function go(id){
  document.querySelectorAll(".sc").forEach(s=>s.classList.remove("on"));
  setTimeout(()=>document.getElementById(id).classList.add("on"),55);
}

/* ── STEP 2 ── */
function step2(){
  uName=document.getElementById("iname").value.trim()||"الصديق الكريم";
  const t=document.getElementById("ititle").value;
  document.getElementById("cname").textContent=t?t+" "+uName:uName;
  go("s3");
}

/* ── STEP 3 ── */
let evOpened=false;
function step3(){
  if(evOpened)return;evOpened=true;
  document.getElementById("openbtn").disabled=true;
  paperSound();
  document.getElementById("evf").classList.add("open");
  setTimeout(()=>{
    go("s4");
    setTimeout(()=>{
      const c=document.getElementById("card");
      c.classList.add("show");
      buildCardStars();enableParallax();
      document.getElementById("acts").classList.add("on");
      document.getElementById("fsig").classList.add("on");
      parallaxOn=true;
    },100);
  },1000);
}

/* ── BACK ── */
function goBack(){
  parallaxOn=false;
  if(decOn)toggleDec();
  stopAudio();
  document.getElementById("acts").classList.remove("on");
  document.getElementById("fsig").classList.remove("on");
  const c=document.getElementById("card");
  c.classList.remove("show");c.style.cssText="opacity:0;transform:scale(.88) translateY(30px)";
  document.getElementById("evf").classList.remove("open");
  evOpened=false;
  document.getElementById("openbtn").disabled=false;
  go("s2");
}

/* ── CARD STARS ── */
function buildCardStars(){
  const cv=document.getElementById("sc2"),c=document.getElementById("card");
  cv.width=c.offsetWidth;cv.height=c.offsetHeight;
  const cx=cv.getContext("2d");
  function twinkle(){
    cx.clearRect(0,0,cv.width,cv.height);
    for(let i=0;i<55;i++){
      const seed=i*.618033;
      const x=(seed%1)*cv.width,y=((seed*1.414)%1)*cv.height;
      const r=((seed*.577)%1)*1.4+.3;
      const a=(.5+.5*Math.sin(Date.now()*.0015+i))*.4;
      cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);
      cx.fillStyle=`rgba(255,255,255,${a})`;cx.fill();
    }
    if(document.getElementById("s4").classList.contains("on"))requestAnimationFrame(twinkle);
  }
  requestAnimationFrame(twinkle);
}

/* ── PARALLAX ── */
function enableParallax(){
  const card=document.getElementById("card");
  function mv(cx,cy){
    if(!parallaxOn)return;
    const nx=(cx/W-.5)*2,ny=(cy/H-.5)*2;
    card.style.transform=`perspective(1100px) rotateX(${ny*-3}deg) rotateY(${nx*3}deg) translate(${nx*5}px,${ny*5}px)`;
    card.style.opacity="1";
  }
  addEventListener("mousemove",e=>mv(e.clientX,e.clientY));
  addEventListener("touchmove",e=>{const t=e.touches[0];mv(t.clientX,t.clientY);},{passive:true});
}

/* ── DOWNLOAD ── */
function dlCard(){
  const card=document.getElementById("card"),r=card.getBoundingClientRect(),SC=2;

  const oc=document.createElement("canvas");oc.width=W2*SC;oc.height=H2*SC;
  const cx=oc.getContext("2d");cx.scale(SC,SC);
  const bg=cx.createLinearGradient(0,0,W2,H2);
  bg.addColorStop(0,"#080808");bg.addColorStop(.55,"#071528");bg.addColorStop(1,"#080808");

  cx.strokeStyle="rgba(212,175,55,.07)";cx.lineWidth=.36;
  for(let x=0;x<W2;x+=34)for(let y=0;y<H2;y+=34){
    cx.beginPath();[[x+17,y+1],[x+32,y+9],[x+32,y+25],[x+17,y+33],[x+2,y+25],[x+2,y+9]].forEach((p,i)=>i?cx.lineTo(p[0],p[1]):cx.moveTo(p[0],p[1]));
    cx.closePath();cx.stroke();
  }
  for(let i=0;i<50;i++){cx.beginPath();cx.arc(Math.random()*W2,Math.random()*H2,Math.random()*1+.25,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${Math.random()*.3+.06})`;cx.fill();}
  const gg=(x1,y1,x2,y2)=>{const g=cx.createLinearGradient(x1,y1,x2,y2);g.addColorStop(0,"#8C6B1F");g.addColorStop(.45,"#D4AF37");g.addColorStop(.58,"#FFF3B0");g.addColorStop(1,"#D4AF37");return g;};
  cx.strokeStyle=gg(0,0,W2,0);cx.lineWidth=2;cx.strokeRect(1,1,W2-2,H2-2);

  cx.globalAlpha=.11;cx.font=`${H2*.13}px serif`;cx.fillStyle="#fff";cx.fillText("🌙",W2/2,H2*.1);cx.globalAlpha=1;
  cx.font=`${Math.max(9,H2*.037)}px "Scheherazade New",serif`;cx.fillStyle="rgba(212,175,55,.5)";cx.fillText("﷽",W2/2,H2*.24);
  cx.strokeStyle=gg(W2*.18,0,W2*.82,0);cx.lineWidth=.7;cx.beginPath();cx.moveTo(W2*.18,H2*.32);cx.lineTo(W2*.82,H2*.32);cx.stroke();
  cx.font=`bold ${Math.max(18,H2*.21)}px "Scheherazade New",serif`;cx.fillStyle=gg(0,0,W2,0);cx.fillText("عيد مبارك",W2/2,H2*.505);
  cx.strokeStyle=gg(W2*.18,0,W2*.82,0);cx.beginPath();cx.moveTo(W2*.18,H2*.615);cx.lineTo(W2*.82,H2*.615);cx.stroke();
  cx.font=`${Math.max(7,H2*.028)}px Amiri,serif`;cx.fillStyle="rgba(212,175,55,.4)";cx.fillText("تهنئةً لـ",W2/2,H2*.675);
  cx.font=`bold ${Math.max(12,H2*.093)}px "Scheherazade New",serif`;cx.fillStyle=gg(0,0,W2,0);cx.fillText(document.getElementById("cname").textContent,W2/2,H2*.765);
  cx.font=`italic ${Math.max(7,H2*.026)}px Amiri,serif`;cx.fillStyle="rgba(245,237,216,.58)";
  cx.fillText("تقبّل الله منّا ومنكم صالح الأعمال",W2/2,H2*.848);cx.fillText("وأعاده عليكم بالخير واليُمن والبركات",W2/2,H2*.888);
  cx.font=`${Math.max(5,H2*.02)}px Amiri,serif`;cx.fillStyle="rgba(212,175,55,.18)";cx.fillText("✦ Atheer Al-Eid ✦",W2/2,H2*.96);
  const a=document.createElement("a");a.download=`عيد-مبارك-${uName||"تهنئة"}.png`;a.href=oc.toDataURL("image/png",1);a.click();
  const fl=document.getElementById("fl");fl.style.opacity="1";setTimeout(()=>fl.style.opacity="0",280);
}
